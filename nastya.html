    async function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            const scale = Math.min(800/img.width, 800/img.height, 1);
            const canvas = document.createElement('canvas');
            canvas.width = img.width * scale; canvas.height = img.height * scale;
            canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
            if (dataUrl.length > 900000) { reject('Изображение слишком большое.'); return; }
            resolve(dataUrl);
          };
          img.onerror = () => reject('Не удалось прочитать изображение.');
          img.src = e.target.result;
        };
        reader.onerror = () => reject('Не удалось прочитать файл.');
        reader.readAsDataURL(file);
      });
    }

    function App() {
      const [authUid,setAuthUid]=useState(null);
      const [userName,setUserName]=useState(loadLocal('nastya:name',''));
      const [items,setItems]=useState([]);const [claims,setClaims]=useState({});const [dreams,setDreams]=useState([]);
      const [itemsLoading,setItemsLoading]=useState(true);const [dreamsLoading,setDreamsLoading]=useState(true);
      const [addError,setAddError]=useState('');const [dreamError,setDreamError]=useState('');const [claimError,setClaimError]=useState('');
      const [previewImage,setPreviewImage]=useState(null);

      useEffect(()=>{ const u=auth.onAuthStateChanged(u=>setAuthUid(u?.uid||null)); return u; },[]);
      useEffect(()=>{ saveLocal('nastya:name',userName); },[userName]);
      useEffect(()=>{
        setItemsLoading(true);
        const u=itemsCol().orderBy('createdAt','desc').onSnapshot(snap=>{const a=[];snap.forEach(d=>a.push({id:d.id,...d.data()}));setItems(a);setItemsLoading(false);},err=>{console.error(err);setItemsLoading(false);});
        return u;
      },[]);
      useEffect(()=>{
        const u=claimsCol().onSnapshot(snap=>{const m={};snap.forEach(d=>m[d.id]=d.data());setClaims(m);},err=>{console.error(err);setClaims({});});
        return u;
      },[]);
      useEffect(()=>{
        setDreamsLoading(true);
        const u=dreamsCol().orderBy('createdAt','desc').onSnapshot(snap=>{const a=[];snap.forEach(d=>a.push({id:d.id,...d.data()}));setDreams(a);setDreamsLoading(false);},err=>{console.error(err);setDreamsLoading(false);});
        return u;
      },[]);

      const trimmedName = (userName||'').trim();
      const isNastya = normalize(trimmedName).startsWith(NASTYA_KEY);

      const nastyaWishes = useMemo(()=>items.filter(i=>i.ownerName&&normalize(i.ownerName).startsWith(NASTYA_KEY)),[items]);
      const nastyaDreams = useMemo(()=>dreams.filter(d=>d.ownerName&&normalize(d.ownerName).startsWith(NASTYA_KEY)),[dreams]);

      const handleAddWish = async ({title,url,note,image}) => {
        setAddError('');
        if(!authUid){setAddError('Не удалось определить пользователя.');return;}
        try{ await itemsCol().add({title,url,note,image:image||null,ownerName:'Настя',addedByUid:authUid,createdAt:Date.now()}); }
        catch(e){ console.error(e); setAddError('Не удалось добавить. Проверьте Firestore Rules.'); }
      };
      const handleUpdateWish = async (id,u) => { try{await itemsCol().doc(id).update(u);}catch(e){console.error(e);setAddError('Не удалось изменить.');} };
      const handleDeleteWish = async id => { try{await itemsCol().doc(id).delete();}catch(e){console.error(e);} };

      const handleAddDream = async ({title,description,link,qrImage}) => {
        setDreamError('');
        if(!authUid){setDreamError('Не удалось определить пользователя.');return;}
        try{ await dreamsCol().add({title,description,link,qrImage:qrImage||null,ownerName:'Настя',addedByUid:authUid,createdAt:Date.now()}); }
        catch(e){ console.error(e); setDreamError('Не удалось добавить.'); }
      };
      const handleUpdateDream = async (id,u) => { try{await dreamsCol().doc(id).update(u);}catch(e){console.error(e);} };
      const handleDeleteDream = async id => { try{await dreamsCol().doc(id).delete();}catch(e){console.error(e);} };

      const handleClaim = async wish => {
        setClaimError('');
        if(!trimmedName){setClaimError('Сначала укажите имя.');return;}
        const ref=claimsCol().doc(wish.id);
        try{ await db.runTransaction(async tx=>{ const s=await tx.get(ref); if(s.exists)throw new Error('taken'); tx.set(ref,{claimerUid:authUid||null,claimerName:trimmedName,createdAt:Date.now()}); }); }
        catch(e){ console.error(e); setClaimError(e.message==='taken'?'Уже забронировано.':'Не удалось забронировать.'); }
      };
      const handleUnclaim = async wish => {
        setClaimError('');
        if(!window.confirm('Снять бронь?'))return;
        const ref=claimsCol().doc(wish.id);
        try{ await db.runTransaction(async tx=>{ const s=await tx.get(ref); if(!s.exists)throw new Error('none'); const d=s.data(); if((d.claimerUid&&d.claimerUid===authUid)||(!d.claimerUid&&normalize(d.claimerName)===normalize(trimmedName)))tx.delete(ref); else throw new Error('not-owner'); }); }
        catch(e){ console.error(e); setClaimError(e.message==='not-owner'?'Только бронировавший может снять бронь.':'Не удалось снять бронь.'); }
      };

      return (
        <div style={{paddingBottom:60}}>
          <Header />
          <WhoAreYouCard userName={userName} setUserName={setUserName} />
          {!trimmedName && <div className="container-narrow"><p className="note" style={{textAlign:'center'}}>Укажите имя выше, чтобы открыть список подарков 🎁</p></div>}

          {trimmedName && isNastya && (
            <main className="container-narrow" style={{display:'flex',flexDirection:'column',gap:24}}>
              <section>
                <div className="section-title" style={{marginBottom:16}}>Подарки</div>
                <AddWishForm onAdd={handleAddWish} disabled={!authUid} error={addError} />
                <p className="note" style={{marginBottom:8}}>Гости не видят, кто что забронировал — сюрприз сохранится 🎁</p>
                {nastyaWishes.length===0&&!itemsLoading&&<p className="note">Пока ничего не добавлено.</p>}
                <div style={{display:'grid',gap:12,gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))'}}>
                  {nastyaWishes.map(w=><WishCardOwner key={w.id} wish={w} onDelete={handleDeleteWish} onUpdate={handleUpdateWish} onImageClick={setPreviewImage} />)}
                </div>
              </section>
              <section>
                <div className="section-title" style={{marginBottom:16}}>Большие мечты</div>
                <AddDreamForm onAdd={handleAddDream} disabled={!authUid} error={dreamError} />
                <p className="note" style={{marginBottom:8}}>Гости смогут вложиться в любую сумму и получат сертификат 💜</p>
                {nastyaDreams.length===0&&!dreamsLoading&&<p className="note">Пока больших мечт нет.</p>}
                <div style={{display:'grid',gap:12,gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))'}}>
                  {nastyaDreams.map(d=><DreamCardOwner key={d.id} dream={d} onDelete={handleDeleteDream} onUpdate={handleUpdateDream} onImageClick={setPreviewImage} />)}
                </div>
              </section>
            </main>
          )}

          {trimmedName && !isNastya && (
            <main className="container-narrow" style={{display:'flex',flexDirection:'column',gap:28}}>
              <section>
                <div className="section-title" style={{marginBottom:12}}>🎁 Идеи подарков</div>
                <p className="note" style={{marginBottom:16}}>Выберите что хотите подарить — другие увидят что подарок занят, а для Насти это останется сюрпризом!</p>
                {claimError&&<div className="err" style={{marginBottom:10}}>{claimError}</div>}
                {nastyaWishes.length===0&&!itemsLoading&&<p className="note">Настя пока не добавила подарки.</p>}
                <div style={{display:'grid',gap:12,gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))'}}>
                  {nastyaWishes.map(w=><WishCardGuest key={w.id} wish={w} claim={claims[w.id]} currentUserName={trimmedName} onClaim={()=>handleClaim(w)} onUnclaim={()=>handleUnclaim(w)} onImageClick={setPreviewImage} />)}
                </div>
              </section>
              <section>
                <div className="section-title" style={{marginBottom:12}}>💜 Большие мечты</div>
                <p className="note" style={{marginBottom:16}}>Вложитесь в мечту на любую сумму — вы получите красивый сертификат, который можно распечатать и подарить!</p>
                {nastyaDreams.length===0&&!dreamsLoading&&<p className="note">Настя пока не добавила мечты.</p>}
                <div style={{display:'grid',gap:12,gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))'}}>
                  {nastyaDreams.map(d=><DreamCardGuest key={d.id} dream={d} guestName={trimmedName} onImageClick={setPreviewImage} />)}
                </div>
              </section>
            </main>
          )}

          {previewImage&&<ImagePreview src={previewImage} onClose={()=>setPreviewImage(null)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
